services:
  - type: web
    name: stripkaka-backend
    runtime: python
    plan: free
    region: singapore
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stripkaka-db
          property: connectionString

databases:
  - name: stripkaka-db
    plan: free
    region: singapore
    databaseName: stripkaka_db
